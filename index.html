.field input,
.field select {
  width: 100%;
  padding: .8rem .9rem;
  border: 1.5px solid #f3d4e4;
  border-radius: .7rem;
  font-size: 1rem;
  color: #1f2937;
  background: #fff;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.field select { cursor: pointer; }
.field select.placeholder { color: #9ca3af; }
.field input:focus,
.field select:focus { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, .15); }
.field input::placeholder { color: #c4b5c9; }
.err { color: #dc2626; font-size: .875rem; margin-bottom: .9rem; }
.btn {
  width: 100%;
  padding: .9rem;
  border: none;
  border-radius: .7rem;
  background: #ec4899;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn:hover:not(:disabled) { background: #db2777; }
.btn:active:not(:disabled) { transform: scale(.98); }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn.ghost { background: #fff; color: #ec4899; border: 1.5px solid #f3d4e4; margin-top: 1rem; }
.btn.ghost:hover:not(:disabled) { background: #fdf2f8; }
.done-card { text-align: center; }
.check {
  width: 64px; height: 64px;
  margin: 0 auto 1.2rem;
  border-radius: 50%;
  background: #ec4899;
  color: #fff;
  font-size: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.done-card h2 { color: #1f2937; margin-bottom: .5rem; }
</style>
